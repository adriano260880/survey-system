global:
  scrape_interval: 5s

scrape_configs:

  - job_name: review-service

    metrics_path: /actuator/prometheus

    static_configs:

      - targets:
          - host.docker.internal:8080

  - job_name: average-service

    metrics_path: /actuator/prometheus

    static_configs:

      - targets:
          - host.docker.internal:8081

  - job_name: query-service

    metrics_path: /actuator/prometheus

    static_configs:

      - targets:
          - host.docker.internal:8082