spring:
  application:
    name: query-service

  profiles:
    active: local

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active}

    distribution:
      percentiles-histogram:
        http.server.requests: true

      percentiles:
        http.server.requests:
          - 0.5
          - 0.9
          - 0.95
          - 0.99

      slo:
        http.server.requests:
          - 50ms
          - 100ms
          - 250ms
          - 500ms
          - 1s

  prometheus:
    metrics:
      export:
        enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Query Service
    version: 1.0.0

server:
  port: 8082

logging:
  level:
    root: INFO
    br.com.adriano.survey.review: INFO