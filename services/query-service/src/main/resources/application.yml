
spring:

  application:
    name: query-service

  data:

    mongodb:
      uri: mongodb://localhost:27017/survey

    redis:
      host: localhost
      port: 6379

management:

  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: 8082